name: 'Busbar — sf-busbar-setup'
description: >-
  Make a Salesforce org Busbar-ready (install packages, ECA OAuth policy,
  permission set, token-exchange handler) and establish NARROW OIDC trust from
  on-disk JSON specs — by running the Rust `sf-busbar-setup` binary directly.
  NO Node, NO Salesforce CLI, NO plugin: the binary IS the headless reconciler
  and downloads in <1s from actions-dist.
author: 'Busbar'

# NOTE: this action runs the Rust binary, NOT `sf busbar setup` (the plugin). The
# plugin remains the INTERACTIVE / subscriber path; CI never shells out to the SF
# CLI just to run a setup we ship as a sub-second binary. The binary currently
# covers package + ECA policy + permset + handler + trust; the plugin's `site`
# (webhook) and `catalog` steps are NOT yet ported — fine for `busbar-suite`,
# which needs neither. (See repo memory: rust-binary-is-setup-no-sf-cli.)
inputs:
  # ---- Packages to install (released 04t ids or aliases) ----
  busbar-package:
    description: 'busbar (core) package version — 04t id or alias.'
    required: true
  github-package:
    description: 'busbar-github (adapter) package version — 04t id or alias.'
    required: true
  skip-nebula:
    description: 'Skip the Nebula Logger dependency install.'
    required: false
    default: 'false'
  execution-user:
    description: 'Apex execution / run-as user for the handler. Empty => the authenticated (scratch admin) session user.'
    required: false
    default: ''
  api-version:
    description: 'Salesforce API version for deploys/queries.'
    required: false
    default: '66.0'

  # ---- Trust: ONLY from on-disk JSON specs, fully-specific by construction ----
  trust-specs:
    description: >-
      Path to a JSON trust-rule spec file (or a directory of *.json specs)
      relative to the checked-out repo. Each rule's claims (repository, workflow
      basename, ref, environment) are REQUIRED named fields — a broad rule can't
      be expressed. The run-as is always the authenticated (scratch admin)
      session user. Empty => skip the trust phase.
    required: false
    default: ''

  # ---- Hub: OPTIONAL registration with a Busbar Hub org ----
  hub-instance-url:
    description: >-
      OPTIONAL: instance URL of a Busbar Hub org to register this org with
      (POST hub/v1/orgs, an idempotent upsert). Authenticated INDEPENDENTLY of
      the target-org session via its own OIDC exchange — requires
      `permissions: id-token: write` on the caller's job. Empty => skip Hub
      registration entirely.
    required: false
    default: ''

  # ---- Auth: the freshly-minted scratch ADMIN session (handed-off token path) ----
  # For a fresh scratch we hold the creation session transiently to bootstrap trust,
  # then it is disposed. SF_ACCESS_TOKEN + SF_INSTANCE_URL come from the `scratch`
  # Environment that sf-org-create -> gh-env-scratch-save populated.
  sf-access-token:
    description: 'Salesforce session access token for the target org (the scratch admin session).'
    required: false
    default: ''
  sf-instance-url:
    description: 'Salesforce instance URL of the target org.'
    required: false
    default: ''
  # ---- OPTIONAL OIDC self-mint path (for an already-trusted target) ----
  target-instance:
    description: 'OPTIONAL: instance URL to OIDC-self-mint against instead of a handed-off token (requires id-token: write + an existing trust rule).'
    required: false
    default: ''
  eca-client-id:
    description: 'OPTIONAL ECA consumer key override for the OIDC exchange.'
    required: false
    default: ''
  token-handler:
    description: 'OPTIONAL Apex token-exchange handler dev name override.'
    required: false
    default: ''

  # ---- Binary fetch ----
  version:
    description: 'sf-busbar-setup release tag to download (e.g. 0.0.9). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-busbar-setup binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

runs:
  using: 'composite'
  steps:
    - name: Install the sf-busbar-setup binary from actions-dist (<1s, no SF CLI)
      uses: busbar-actions/setup@main
      with:
        binary: sf-busbar-setup
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Make the org Busbar-ready + establish narrow trust (binary self-runs)
      shell: bash
      env:
        BUSBAR_PACKAGE: ${{ inputs.busbar-package }}
        BUSBAR_GITHUB_PACKAGE: ${{ inputs.github-package }}
        BUSBAR_SKIP_NEBULA: ${{ inputs.skip-nebula }}
        BUSBAR_EXECUTION_USER: ${{ inputs.execution-user }}
        BUSBAR_API_VERSION: ${{ inputs.api-version }}
        # Raw input only — exported as BUSBAR_TRUST_SPECS in the run step ONLY when
        # non-empty. An empty value would make the binary's clap reject
        # --trust-specs ("a value is required"); empty => skip the trust phase.
        INPUT_TRUST_SPECS: ${{ inputs.trust-specs }}
        # Same empty-value caveat as INPUT_TRUST_SPECS — exported ONLY when
        # non-empty, below.
        INPUT_HUB_INSTANCE_URL: ${{ inputs.hub-instance-url }}
        # Auth: handed-off scratch-admin token by default; OIDC self-mint if
        # target-instance is set and no token is provided. busbar-auth
        # session_from_env uses SF_ACCESS_TOKEN+SF_INSTANCE_URL when both present,
        # else OIDC. The session is disposed (zeroized) at binary exit.
        SF_ACCESS_TOKEN: ${{ inputs.sf-access-token }}
        SF_INSTANCE_URL: ${{ inputs.target-instance != '' && inputs.target-instance || inputs.sf-instance-url }}
        ECA_CLIENT_ID: ${{ inputs.eca-client-id }}
        TOKEN_HANDLER_APEX: ${{ inputs.token-handler }}
      run: |
        set -euo pipefail
        # Only export BUSBAR_TRUST_SPECS when non-empty so the binary sees it as
        # absent (skip trust) rather than an empty value clap rejects.
        if [ -n "${INPUT_TRUST_SPECS:-}" ]; then
          export BUSBAR_TRUST_SPECS="$INPUT_TRUST_SPECS"
        fi
        # Same for BUSBAR_HUB_INSTANCE_URL — empty means skip Hub registration.
        if [ -n "${INPUT_HUB_INSTANCE_URL:-}" ]; then
          export BUSBAR_HUB_INSTANCE_URL="$INPUT_HUB_INSTANCE_URL"
        fi
        echo "Running sf-busbar-setup against ${SF_INSTANCE_URL} (trust-specs='${INPUT_TRUST_SPECS:-<none>}', hub='${INPUT_HUB_INSTANCE_URL:-<none>}')"
        sf-busbar-setup
