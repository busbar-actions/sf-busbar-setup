name: 'Busbar — sf-busbar-setup'
description: >-
  Install + configure Busbar in a target org and establish OIDC trust, so
  GitHub workflows can token-exchange against it. This action is a thin CI
  wrapper around the CANONICAL orchestrator `sf busbar setup` (the
  sf-busbar-plugin) — it does NOT reimplement setup. The single source of truth
  for "what setup does" is the plugin / docs/architecture/org-setup-contract.md.
author: 'Busbar'

# Unlike the Rust action binaries, setup runs the published sf CLI plugin, so
# this is the one action that brings Node + the sf CLI into the suite (a
# deliberate trade-off to avoid forking the setup orchestrator).
inputs:
  plugin-version:
    description: 'sf-busbar-plugin version/dist-tag to install (the published plugin bakes the released package 04t ids).'
    required: false
    default: 'latest'
  phase:
    description: 'sf busbar setup --phase (all | install | config | site | handler | permsets | catalog).'
    required: false
    default: 'all'
  install-mode:
    description: 'sf busbar setup --install-mode (auto | package | source). auto => managed install on a fresh org.'
    required: false
    default: 'auto'
  execution-user:
    description: 'Apex execution user / run-as for the handler. Empty => the authenticated (scratch admin) user.'
    required: false
    default: ''
  configure-browser-eca:
    description: 'Also configure the browser ECA envelope. Off by default for ephemeral scratch targets.'
    required: false
    default: 'false'
  # --- Trust establishment: map the acting workflow's OIDC claims -> a run-as user in this org ---
  trust-bootstrap:
    description: 'Seed an Allow trust rule for the workflow that will act on this org.'
    required: false
    default: 'true'
  trust-repository:
    description: 'GitHub repository claim to trust (owner/repo).'
    required: false
    default: ${{ github.repository }}
  trust-environment:
    description: 'GitHub environment claim to match (optional).'
    required: false
    default: ''
  trust-ref:
    description: 'Git ref claim to match.'
    required: false
    default: ${{ github.ref }}
  trust-workflow-ref:
    description: 'job_workflow_ref claim to match (the acting workflow).'
    required: false
    default: ${{ github.workflow_ref }}
  trust-salesforce-username:
    description: 'Salesforce run-as username the trust rule maps to. Empty => the authenticated user.'
    required: false
    default: ''

# Consumes the target org session from the calling job's env (e.g. the `scratch`
# Environment populated by sf-org-create -> gh-env-scratch-save):
#   SF_ACCESS_TOKEN, SF_INSTANCE_URL
runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Salesforce CLI + Busbar plugin
      shell: bash
      run: |
        set -euo pipefail
        npm install --global @salesforce/cli >/dev/null 2>&1
        # oclif prompts to confirm a non-signed plugin; auto-confirm.
        echo 'y' | sf plugins install "sf-busbar-plugin@${{ inputs.plugin-version }}"
        sf version --verbose | sed -n '1,40p'

    - name: Authenticate to the target org (access token)
      id: auth
      shell: bash
      env:
        SFDX_ACCESS_TOKEN: ${{ env.SF_ACCESS_TOKEN }}
        SF_INSTANCE_URL: ${{ env.SF_INSTANCE_URL }}
      run: |
        set -euo pipefail
        if [[ -z "${SFDX_ACCESS_TOKEN:-}" || -z "${SF_INSTANCE_URL:-}" ]]; then
          echo "::error::sf-busbar-setup needs SF_ACCESS_TOKEN + SF_INSTANCE_URL in the job env (the target org session)."
          exit 1
        fi
        sf org login access-token --instance-url "${SF_INSTANCE_URL}" --alias busbar-target --no-prompt
        runas="$(sf org display --target-org busbar-target --json | python3 -c 'import sys,json;print(json.load(sys.stdin)["result"]["username"])')"
        echo "runas=${runas}" >> "$GITHUB_OUTPUT"
        echo "Authenticated to ${SF_INSTANCE_URL} as ${runas}"

    - name: Set up Busbar + establish trust
      shell: bash
      run: |
        set -euo pipefail
        runas="${{ steps.auth.outputs.runas }}"
        exec_user="${{ inputs.execution-user }}"; exec_user="${exec_user:-$runas}"
        trust_user="${{ inputs.trust-salesforce-username }}"; trust_user="${trust_user:-$runas}"

        args=( --target-org busbar-target
               --phase "${{ inputs.phase }}"
               --install-mode "${{ inputs.install-mode }}"
               --execution-user "${exec_user}" )

        [[ "${{ inputs.configure-browser-eca }}" == "true" ]] || args+=( --no-configure-browser-eca )

        if [[ "${{ inputs.trust-bootstrap }}" == "true" ]]; then
          args+=( --trust-bootstrap
                  --trust-repository "${{ inputs.trust-repository }}"
                  --trust-ref "${{ inputs.trust-ref }}"
                  --trust-workflow-ref "${{ inputs.trust-workflow-ref }}"
                  --trust-salesforce-username "${trust_user}" )
          [[ -n "${{ inputs.trust-environment }}" ]] && args+=( --trust-environment "${{ inputs.trust-environment }}" )
        fi

        echo "Running: sf busbar setup ${args[*]}"
        sf busbar setup "${args[@]}"
